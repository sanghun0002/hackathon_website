<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>후기 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .slider-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1rem;
            background-color: #f9fafb;
            padding: 1rem 0;
            border-radius: 0.5rem;
        }
        .slide {
            flex: 0 0 100%;
            scroll-snap-align: center;
        }
        .slide img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-gray-50">

    <div class="container mx-auto max-w-3xl my-8 px-4">
        <header class="text-center mb-10">
            <a href="index.html" class="text-3xl font-bold text-gray-800">쉬어가~ 계곡</a>
        </header>

        <main class="bg-white p-8 rounded-lg shadow-md">
            <div id="view-mode">
                <h1 id="detail-title" class="text-3xl font-bold text-gray-900 mb-4">...</h1>
                <div class="detail-meta text-sm text-gray-500 flex items-center flex-wrap gap-x-2 mb-6">
                    <span id="detail-author"></span>
                    <span>|</span>
                    <span id="detail-date"></span>
                    <span>|</span>
                    <span>조회수 <span id="detail-views"></span></span>
                    <span>|</span>
                    <div class="form-group">
                    <label for="rating" class="block text-sm font-medium text-gray-700">별점</label>
                    <div class="rating-edit flex gap-1 text-yellow-500 text-2xl">
                        <input type="radio" name="rating" id="rate5" value="5" class="hidden">
                        <label for="rate5" class="cursor-pointer">★</label>
                        <input type="radio" name="rating" id="rate4" value="4" class="hidden">
                        <label for="rate4" class="cursor-pointer">★</label>
                        <input type="radio" name="rating" id="rate3" value="3" class="hidden" checked>
                        <label for="rate3" class="cursor-pointer">★</label>
                        <input type="radio" name="rating" id="rate2" value="2" class="hidden">
                        <label for="rate2" class="cursor-pointer">★</label>
                        <input type="radio" name="rating" id="rate1" value="1" class="hidden">
                        <label for="rate1" class="cursor-pointer">★</label>
                    </div>
</div>

                </div>
                <hr class="border-gray-200">
                <div id="detail-images-container" class="py-8" style="display: none;">
                    <div class="slider-wrapper">
                    </div>
                </div>
                <div class="detail-content text-gray-800 leading-relaxed" id="detail-content">
                    <p>... 내용을 불러오는 중 ...</p>
                </div>
                <hr class="border-gray-200 mt-8">
            </div>

            <div class="detail-footer mt-6 flex justify-between items-center">
                <a href="review.html" class="list-btn bg-gray-200 text-gray-800 font-bold py-2 px-5 rounded-lg hover:bg-gray-300 transition">
                    목록으로
                </a>
                <div class="detail-actions flex gap-2">
                    <a href="#" id="edit-btn" class="edit-btn text-sm text-gray-600 hover:text-blue-600 transition">수정</a>
                    <a href="#" id="delete-btn" class="delete-btn text-sm text-gray-600 hover:text-red-600 transition">삭제</a>
                </div>
            </div>
        </main>
    </div>

    <script src="review_detail.js"></script>
</body>
</html>
