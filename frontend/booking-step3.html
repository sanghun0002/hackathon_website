<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구역선택</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <header class="main-header">
        <div class="logo">쉬어가~ 계곡</div>
    </header>

    <div class="board-container">
        <header class="board-header">
            <a href="index.html" class="home-link"><i class="fas fa-home"></i> 홈</a>
        </header>
    </div>
    
    <main class="booking-container">
        <div class="step-indicator">
            <div class="step"><span>날짜 선택</span></div>
            <div class="step"><span>지역/계곡 선택</span></div>
            <div class="step active"><span>구역 선택</span></div>
            <div class="step"><span>평상 선택</span></div>
        </div>
        <div class="container mx-auto max-w-[1300px] p-6 rounded-lg">
            <div class="text-center mb-6">
                <p class="text-gray-600">
                    <span id="selected-valley-display" class="font-bold text-blue-600"></span>의 구역을 선택해주세요.
                </p>
            </div>
            <div id="image-map-container" class="relative">
                <p id="loading-message" class="text-center text-gray-500">지도를 불러오는 중...</p>
            </div>  
        </div>
    </main>

    <div class="buttons">
        <a href="booking-step2.html" class="btn btn-secondary">← 이전</a>
        <button id="next-step-btn" class="btn btn-primary" disabled>다음 →</button>
    </div>

    <footer class="main-footer"></footer>
    <script src="booking-step3.js"></script>
</body>
</html>
