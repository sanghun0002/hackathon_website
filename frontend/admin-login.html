<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-100">
    <main class="login-container">
        <h1 class="text-3xl font-bold text-center mb-6">관리자 로그인</h1>
        <div class="space-y-4">
            <div>
                <label for="password-input" class="block text-sm font-medium text-gray-700">비밀번호</label>
                <input type="password" id="password-input" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" placeholder="비밀번호를 입력하세요.">
            </div>
            <button id="login-btn" class="w-full px-4 py-2 bg-blue-500 text-white font-semibold rounded-md shadow-sm hover:bg-blue-600 transition-colors">로그인</button>
        </div>
        <p id="error-message" class="text-sm text-red-600 mt-4 text-center hidden">비밀번호가 올바르지 않습니다.</p>
    </main>
    <script src="admin-login.js"></script>
</body>
</html>
