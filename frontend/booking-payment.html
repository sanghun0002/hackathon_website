<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 진행</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://cdn.iamport.kr/js/iamport.payment-1.2.0.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <main class="max-w-lg mx-auto">
        <h1 class="text-3xl font-bold text-center mb-6">결제하기</h1>

        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-xl font-semibold mb-4">최종 주문 정보</h2>
            <p><strong>상품명:</strong> <span id="product-name">정보 없음</span></p>
            <p><strong>주문자:</strong> <span id="buyer-name">정보 없음</span></p>
            <p class="font-bold text-lg"><strong>결제 금액:</strong> <span id="payment-amount">0</span>원</p>
        </div>

        <div class="bg-white p-6 rounded-lg shadow">
            <button id="payment-button" class="w-full bg-yellow-400 text-black font-bold py-3 rounded-lg hover:bg-yellow-500 transition">
                카카오페이로 결제하기
            </button>
        </div>

        <div id="result-message" class="bg-white p-8 rounded-lg shadow-md text-center hidden mt-6"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. [수정] URL 쿼리 파라미터에서 모든 예약 정보 불러오기 ---
            const urlParams = new URLSearchParams(window.location.search);
            const deckString = urlParams.get('deck');
            
            // 필수 정보가 하나라도 없으면 오류 처리
            if (!urlParams.has('date') || !urlParams.has('valley') || !urlParams.has('section') || !deckString || !urlParams.has('name') || !urlParams.has('phone')) {
                alert('예약 정보가 올바르지 않습니다. 처음부터 다시 시도해주세요.');
                window.location.href = 'booking.html';
                return;
            }

            const bookingInfo = {
                date: urlParams.get('date'),
                valley: urlParams.get('valley'),
                section: urlParams.get('section'),
                deck: JSON.parse(decodeURIComponent(deckString)),
                name: urlParams.get('name'),
                phone: urlParams.get('phone'),
                // 가격은 테스트 목적으로 50,000원으로 고정 (실제로는 deck 정보에 가격 포함 필요)
                amount: 50000 
            };
            
            const productName = `${bookingInfo.valley} ${bookingInfo.section} ${bookingInfo.deck.name}`;
            
            // --- 2. 화면에 최종 정보 표시 ---
            document.getElementById('product-name').textContent = productName;
            document.getElementById('buyer-name').textContent = bookingInfo.name;
            document.getElementById('payment-amount').textContent = bookingInfo.amount.toLocaleString();

            // --- 3. 아임포트 초기화 및 결제 로직 ---
            const IMP = window.IMP;
            IMP.init("imp02243407"); 

            const paymentButton = document.getElementById("payment-button");
            const resultDiv = document.getElementById("result-message");

            paymentButton.addEventListener("click", function() {
                IMP.request_pay({
                    pg: "kakaopay.TC0ONETIME",
                    pay_method: "card",
                    merchant_uid: "order_" + new Date().getTime(),
                    name: productName,
                    amount: bookingInfo.amount,
                    buyer_name: bookingInfo.name,
                    buyer_tel: bookingInfo.phone,
                }, function (rsp) {
                    if (rsp.success) {
                        // --- 4. 결제 성공 시, 서버에 최종 예약 정보 저장 ---
                        const finalBookingData = {
                            name: bookingInfo.name,
                            phone: bookingInfo.phone,
                            bookingDate: bookingInfo.date,
                            valley: bookingInfo.valley,
                            section: bookingInfo.section,
                            deckName: bookingInfo.deck.name,
                            capacity: bookingInfo.deck.capacity,
                            status: "예약 및 결제 완료"
                        };

                        const serverUrl = 'https://o70albxd7n.onrender.com';
                        fetch(`${serverUrl}/api/bookings`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(finalBookingData)
                        })
                        .then(res => {
                            if (!res.ok) throw new Error("서버에 예약 정보를 저장하는 데 실패했습니다.");
                            return res.json();
                        })
                        .then(data => {
                            console.log("서버 저장 성공:", data);
                            
                            // 성공 화면 표시
                            resultDiv.innerHTML = `
                                <h2 class="text-2xl font-bold text-blue-600 mb-4">예약 및 결제가 완료되었습니다!</h2>
                                <p class="text-gray-600 mb-6">예약 조회 페이지에서 정보를 확인하실 수 있습니다.</p>
                                <div class="flex gap-4 justify-center">
                                    <a href="booking-check.html" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-blue-700 transition">예약 조회하기</a>
                                    <a href="index.html" class="bg-gray-200 text-gray-800 font-bold py-3 px-8 rounded-lg hover:bg-gray-300 transition">홈으로</a>
                                </div>
                            `;
                            resultDiv.classList.remove('hidden');
                            document.getElementById('payment-button').parentElement.classList.add('hidden');
                        })
                        .catch(err => {
                            alert(`결제는 성공했으나 예약 정보 저장 중 오류가 발생했습니다. 관리자에게 문의해주세요. (오류: ${err.message})`);
                        });

                    } else {
                        alert("결제에 실패했습니다: " + rsp.error_msg);
                    }
                });
            });
        });
    </script>
</body>
</html>
