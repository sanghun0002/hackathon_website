<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 시스템</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>결제 시스템</h1>
            <p>결제 금액: <span class="price">50,000원</span></p>
        </header>
        <main>
            <div class="payment-method">
                <label><input type="radio" name="payment" value="card" checked> 카드 결제</label>
                <label><input type="radio" name="payment" value="transfer"> 무통장 입금</label>
            </div>

            <form id="card-form" class="payment-details">
                <div class="form-group">
                    <label for="bank-name">은행 선택</label>
                    <input type="text" id="bank-name" placeholder="예: 국민은행" required>
                </div>
                <div class="form-group">
                    <label for="card-number">카드 번호</label>
                    <input type="text" id="card-number" placeholder="- 없이 입력" required>
                </div>
                <button type="submit" class="btn">결제 완료</button>
            </form>

            <div id="transfer-info" class="payment-details" style="display: none;">
                <h4>입금 계좌 정보</h4>
                <p><strong>은행:</strong> OO은행</p>
                <p><strong>계좌번호:</strong> 123-456-789012</p>
                <p><strong>예금주:</strong> 김관리</p>
                <p class="warning">입금 확인은 관리자가 수동으로 진행합니다.</p>
                <button id="transfer-btn" class="btn">입금 완료 문자 전송</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
