<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>후기 작성</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="board-container">
        <main style="padding: 30px;">
            <h1 class="board-title">후기 작성</h1>
            <form id="review-form">
                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="author">작성자</label>
                    <input type="text" id="author" required>
                </div>
                <div class="form-group">
                    <label>평점</label>
                    <div class="rating">
                        <input type="radio" id="star5" name="rating" value="5" required><label for="star5">⭐</label>
                        <input type="radio" id="star4" name="rating" value="4"><label for="star4">⭐</label>
                        <input type="radio" id="star3" name="rating" value="3"><label for="star3">⭐</label>
                        <input type="radio" id="star2" name="rating" value="2"><label for="star2">⭐</label>
                        <input type="radio" id="star1" name="rating" value="1"><label for="star1">⭐</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="content">내용</label>
                    <textarea id="content" rows="10" required></textarea>
                </div>
                <div class="form-group">
                    <label>사진 첨부 (최대 5장)</label>
                    <label for="images" class="file-label">파일 선택</label>
                    <input type="file" id="images" accept="image/*" multiple>
                    <div class="image-preview-container" id="image-preview-container" style="display: none;"></div>
                </div>

                <hr class="form-divider">
                <div class="form-group">
                    <label for="password">비밀번호 설정 (수정/삭제 시 필요)</label>
                    <input type="password" id="password" required autocomplete="new-password">
                </div>
                
                <button type="submit" class="save-btn">저장하기</button>
            </form>
        </main>
    </div>
    <script src="review_write.js"></script>
</body>
</html>
