<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>후기 작성</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="board-container">
        <main style="padding: 30px;">
            <h1 class="board-title">후기 작성</h1>
            <form id="review-form">
                
                <!-- 제목 -->
                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" required>
                </div>

                <!-- 작성자 -->
                <div class="form-group">
                    <label for="author">작성자</label>
                    <input type="text" id="author" required>
                </div>

                <!-- 평점 -->
                <div class="form-group">
                    <label for="rating">평점</label>
                    <div class="rating-edit">
                        <input type="radio" name="rating" id="rate5" value="5">
                        <label for="rate5">★</label>
                        <input type="radio" name="rating" id="rate4" value="4">
                        <label for="rate4">★</label>
                        <input type="radio" name="rating" id="rate3" value="3">
                        <label for="rate3">★</label>
                        <input type="radio" name="rating" id="rate2" value="2">
                        <label for="rate2">★</label>
                        <input type="radio" name="rating" id="rate1" value="1">
                        <label for="rate1">★</label>
                    </div>
                </div>

                <!-- 내용 -->
                <div class="form-group">
                    <label for="content">내용</label>
                    <textarea id="content" rows="10" required></textarea>
                </div>

                <!-- 사진 첨부 -->
                <div class="form-group">
                    <label>사진 첨부 <br>(최대 5장)</label>
                    <label for="images" class="file-label">파일 선택</label>
                    <input type="file" id="images" accept="image/*" multiple>
                    <div class="image-preview-container" id="image-preview-container" style="display: none;"></div>
                </div>
                
                <hr class="form-divider">

                <!-- 비밀번호 -->
                <div class="form-group">
                    <label for="password">비밀번호 설정<br> (수정/삭제 시<br> 필요)</label>
                    <input type="password" id="password" required autocomplete="new-password">
                </div>

                <!-- 저장 버튼 -->
                <button type="submit" class="save-btn">저장하기</button>
            </form>
        </main>
    </div>
    <script src="review_write.js"></script>
</body>
</html>
