<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen py-12">
    <div class="w-full max-w-md">
        <form id="signup-form" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
            <div class="mb-6 text-center">
                <a href="index.html" class="text-3xl font-bold text-gray-800">쉬어가~ 계곡</a>
                <h2 class="text-xl text-gray-600 mt-2">회원가입</h2>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="name">이름</label>
                <input id="name" type="text" placeholder="홍길동" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="phone">전화번호</label>
                <input id="phone" type="tel" placeholder="'-' 없이 입력" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="email">이메일</label>
                <input id="email" type="email" placeholder="email@example.com" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">비밀번호</label>
                <input id="password" type="password" placeholder="6자 이상 입력" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700" required>
            </div>
            <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold w-full py-2 rounded">가입하기</button>
            <p class="text-center mt-4 text-sm">
                이미 계정이 있으신가요? <a href="login.html" class="text-blue-600 font-bold">로그인</a>
            </p>
            <p id="error-message" class="text-red-500 text-xs italic mt-2 text-center"></p>
        </form>
    </div>

   <script type="module">
    import { auth, db } from './firebase-config.js';
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const signupForm = document.getElementById('signup-form');
    const errorMessage = document.getElementById('error-message');

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      errorMessage.textContent = '';

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Firestore 'users' 컬렉션에 사용자 uid를 문서 ID로 하여 정보를 저장합니다.
        const userDocRef = doc(db, 'users', user.uid);
        
        await setDoc(userDocRef, { name, phone, email, createdAt: new Date() });
        alert('회원가입 성공! 로그인 페이지로 이동합니다.');
        window.location.href = 'login.html';
      } catch(error) {
        if (error.code === 'auth/email-already-in-use') {
          errorMessage.textContent = '이미 사용 중인 이메일입니다.';
        } else if (error.code === 'auth/weak-password') {
          errorMessage.textContent = '비밀번호는 6자 이상이어야 합니다.';
        } else {
          errorMessage.textContent = '회원가입 실패: ' + error.message;
        }
        console.error(error);
      }
    });
  </script>
</body>
</html>
