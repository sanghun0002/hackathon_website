<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>예약 조회</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <header class="main-header"><div class="logo">쉬어가~ 계곡</div></header>
    <main class="booking-container">
        <h1 class="text-3xl font-bold text-center mb-6">예약 내역 조회</h1>
        
        <form id="check-form" class="bg-white p-6 rounded-lg shadow-lg mb-8">
            <p class="text-center text-gray-600 mb-6">예약 시 입력하신 이름과 전화번호를 입력해주세요.</p>
            <div class="grid md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label for="check-name" class="block mb-2 font-semibold">이름</label>
                    <input type="text" id="check-name" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label for="check-phone" class="block mb-2 font-semibold">전화번호</label>
                    <input type="tel" id="check-phone" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="010-1234-5678" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-full text-lg">조회하기</button>
        </form>
        
        <div id="check-result-container" class="bg-white p-6 rounded-lg shadow-lg" style="display: none;">
            
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">조회 결과</h2>
                <button id="cancel-booking-btn" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                    예약 취소
                </button>
            </div>
            <div id="check-result" class="overflow-x-auto">
                </div>
        </div>
    </main>
    <div class="buttons">
         <a href="index.html" class="btn btn-secondary">← 홈으로</a>
    </div>
    <script src="booking-check.js"></script>
</body>
</html>
