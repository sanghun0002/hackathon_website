<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 관리</title>

    <!-- =============================================================== -->
    <!-- ===== [추가된 부분] 관리자 접근을 제어하는 '문지기' 스크립트 ===== -->
    <!-- =============================================================== -->
    <script type="module" src="admin-guard.js"></script>
    <!-- =============================================================== -->

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 상태별 텍스트 색상 스타일 */
        .status-completed {
            color: #10B981; /* 초록색 */
            font-weight: 600;
        }
        .status-using {
            color: #3B82F6; /* 파란색 */
            font-weight: 600;
        }
        .status-pending {
            color: #6B7280; /* 회색 */
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <header class="main-header">
        <div class="logo">쉬어가~ 계곡 (관리자)</div>
    </header>

    <main class="container mx-auto max-w-[1300px] bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-3xl font-bold mb-4">예약 관리</h1>
        
        <!-- 필터 및 검색 영역 -->
        <div class="filters grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6 p-4 rounded-lg bg-gray-50">
            <div>
                <label for="filter-date" class="block text-sm font-medium text-gray-700">날짜</label>
                <input type="date" id="filter-date" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div>
                <label for="filter-valley" class="block text-sm font-medium text-gray-700">계곡</label>
                <select id="filter-valley" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    <option value="">전체</option>
                </select>
            </div>
            <div>
                <label for="filter-section" class="block text-sm font-medium text-gray-700">구역</label>
                <select id="filter-section" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" disabled>
                    <option value="">전체</option>
                </select>
            </div>
            <div>
                <label for="search-name" class="block text-sm font-medium text-gray-700">이름</label>
                <div class="mt-1 flex rounded-md shadow-sm">
                    <input type="text" id="search-name" placeholder="이름 검색" class="block w-full rounded-l-md border-gray-300 focus:border-blue-500 focus:ring-blue-500">
                    <button id="search-btn" type="button" class="-ml-px relative inline-flex items-center space-x-2 px-4 py-2 border border-gray-300 text-sm font-medium rounded-r-md text-gray-700 bg-gray-50 hover:bg-gray-100 focus:outline-none">
                        검색
                    </button>
                </div>
            </div>
        </div>

        <!-- 예약 현황 및 테이블 영역 -->
        <div class="mb-4 flex items-center justify-between">
            <h2 class="text-xl font-bold">예약 현황</h2>
            <div class="text-gray-600">총 예약 건수: <span id="total-bookings" class="font-bold">0</span>건</div>
        </div>
        
        <div class="overflow-x-auto bg-white rounded-lg shadow">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">날짜</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">계곡</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">구역</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">평상</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">이름</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">전화번호</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">상태</th>
                    </tr>
                </thead>
                <tbody id="booking-table-body" class="bg-white divide-y divide-gray-200">
                    <!-- 예약 데이터는 JS에서 동적으로 생성됩니다 -->
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div id="pagination-controls" class="flex justify-center mt-6">
            <!-- 페이지네이션 버튼은 JS에서 동적으로 생성됩니다 -->
        </div>
    </main>
    <div class="buttons">
         <a href="index.html" class="btn btn-secondary">← 홈으로</a>
    </div>
    <footer class="main-footer"></footer>
    <script type="module" src="admin.js"></script>
</body>
</html>
