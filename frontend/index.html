<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>쉬어가~ 계곡</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- 헤더 -->
  <header class="flex justify-between items-center p-4 bg-white shadow">
    <button id="adminBtn" class="px-4 py-2 rounded bg-gray-200">관리자</button>
    <h1 class="text-xl font-bold">쉬어가~ 계곡</h1>
    <button id="loginBtn" class="px-4 py-2 rounded bg-blue-500 text-white">로그인</button>
  </header>

  <!-- 메인 -->
  <main class="p-6">
    <div class="relative w-full h-64 overflow-hidden rounded-xl shadow">
      <img src="https://picsum.photos/id/1018/1200/400" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center">
        <h2 class="text-3xl text-white font-bold">전국 계곡 여행은 쉬어가~ 계곡!</h2>
      </div>
    </div>

    <!-- 메뉴 -->
    <div class="grid grid-cols-5 gap-4 mt-6">
      <div class="bg-white shadow rounded-xl p-4 text-center">공지사항</div>
      <div class="bg-white shadow rounded-xl p-4 text-center">예약하기</div>
      <div class="bg-white shadow rounded-xl p-4 text-center">편의사항</div>
      <div class="bg-white shadow rounded-xl p-4 text-center">내 예약확인</div>
      <div class="bg-white shadow rounded-xl p-4 text-center">사용후기</div>
    </div>
  </main>

  <!-- Firebase SDK -->
  <script type="module">
    import { app, auth } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const loginBtn = document.getElementById("loginBtn");
    const adminBtn = document.getElementById("adminBtn");

    // 로그인 상태 체크
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // 로그인 상태
        loginBtn.textContent = "로그아웃";
        loginBtn.onclick = async () => {
          await signOut(auth);
          alert("로그아웃되었습니다.");
          window.location.reload();
        };

        // 관리자 버튼
        if (user.email.includes("admin")) {
          adminBtn.textContent = "관리자";
          adminBtn.onclick = () => window.location.href = "admin.html";
        } else {
          adminBtn.textContent = "내 예약확인";
          adminBtn.onclick = () => window.location.href = "reservation.html";
        }
      } else {
        // 로그아웃 상태
        loginBtn.textContent = "로그인";
        loginBtn.onclick = () => window.location.href = "login.html";

        adminBtn.textContent = "관리자";
        adminBtn.onclick = () => alert("로그인 후 이용할 수 있습니다.");
      }
    });
  </script>
</body>
</html>
