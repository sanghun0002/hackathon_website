<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen py-12">
    <div class="w-full max-w-md">
        <form id="login-form" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
            <div class="mb-6 text-center">
                <a href="index.html" class="text-3xl font-bold text-gray-800">쉬어가~ 계곡</a>
                <h2 class="text-xl text-gray-600 mt-2">로그인</h2>
            </div>
            <div class="mb-4">
                 <label class="block text-gray-700 text-sm font-bold mb-2" for="email">이메일</label>
                <input id="email" type="email" placeholder="이메일" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">비밀번호</label>
                <input id="password" type="password" placeholder="비밀번호" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700" required>
            </div>
            <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold w-full py-2 rounded">로그인</button>
            <p class="text-center mt-4 text-sm">
                계정이 없으신가요? <a href="signup.html" class="text-blue-600 font-bold">회원가입</a>
            </p>
            <p id="error-message" class="text-red-500 text-xs italic mt-2 text-center"></p>
        </form>
    </div>

   <script type="module">
      // 1. firebase-config.js에서 appId를 추가로 import 합니다.
      import { auth, db, appId } from './firebase-config.js';
      import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const loggedInView = document.getElementById('logged-in-view');
      const loggedOutView = document.getElementById('logged-out-view');
      const userNameSpan = document.getElementById('user-name');
      const logoutBtn = document.getElementById('logout-btn');

      onAuthStateChanged(auth, async (user) => {
          if (user) {
              try {
                  // 2. 데이터를 읽어올 경로를 index.html과 동일하게 수정합니다.
                  const userDocRef = doc(db, `artifacts/${appId}/users/${user.uid}`);
                  const docSnap = await getDoc(userDocRef);

                  if (docSnap.exists()) {
                      userNameSpan.textContent = docSnap.data().name;
                  } else {
                      userNameSpan.textContent = user.email;
                  }
              } catch (error) {
                  console.error("사용자 정보 가져오기 실패:", error);
                  userNameSpan.textContent = user.email;
              }

              loggedInView.classList.remove('hidden');
              loggedOutView.classList.add('hidden');

          } else {
              loggedOutView.classList.remove('hidden');
              loggedInView.classList.add('hidden');
          }
      });

      logoutBtn.addEventListener('click', () => {
          signOut(auth)
              .then(() => console.log('로그아웃 성공'))
              .catch(error => {
                  console.error('로그아웃 실패:', error);
                  alert('로그아웃에 실패했습니다.');
              });
      });
  </script>
</body>
</html>
