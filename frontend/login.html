<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen">
    <header class="main-header">
        <div class="logo">쉬어가~ 계곡</div>
    </header>

    <div class="board-container">
        <header class="board-header">
            <a href="index.html" class="home-link"><i class="fas fa-home"></i> 홈</a>
        </header>
    </div>

    <div class="w-full max-w-md">
        <form id="login-form" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
            <div class="mb-6 text-center">
                <h2 class="text-xl text-gray-600 mt-2">로그인</h2>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-base font-bold mb-2" for="email">이메일</label>
                <input id="email" type="email" placeholder="이메일" class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-base font-bold mb-2" for="password">비밀번호</label>
                <input id="password" type="password" placeholder="비밀번호" class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" required>
            </div>
            <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold w-full py-3 rounded focus:outline-none focus:shadow-outline">로그인</button>
            <p class="text-center mt-4">
                계정이 없으신가요? <a href="signup.html" class="text-blue-600 font-bold">회원가입</a>
            </p>
            <p id="error-message" class="text-red-500 text-sm italic mt-2 text-center"></p>
        </form>
    </div>

    <script type="module">
        import { login } from './auth.js';

        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            errorMessage.textContent = '';

            try {
                await login(email, password);
                alert('로그인 성공!');
                const urlParams = new URLSearchParams(window.location.search);
                const redirectUrl = urlParams.get('redirect');

                if (redirectUrl) {
                    window.location.href = redirectUrl;
                } else {
                    window.location.href = 'index.html';
                }
            } catch(error) {
                if (error.code === 'auth/invalid-credential') {
                    errorMessage.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
                } else {
                    errorMessage.textContent = '로그인 실패: ' + error.message;
                }
            }
        });
    </script>
</body>
</html>
