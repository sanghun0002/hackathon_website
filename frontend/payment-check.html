<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 확인 및 취소</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>예약 확인 및 취소</h1>
        </header>
        <main>
            <form id="check-form">
                <div class="form-group">
                    <label for="check-name">이름</label>
                    <input type="text" id="check-name" required>
                </div>
                <div class="form-group">
                    <label for="check-phone">전화번호</label>
                    <input type="tel" id="check-phone" required>
                </div>
                <button type="submit" class="btn">예약 조회</button>
            </form>
            <div id="reservation-status" class="status-box" style="display: none;">
                </div>
             <div class="nav-links">
                <a href="payment-index.html">홈으로</a>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
