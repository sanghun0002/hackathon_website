<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>예약 정보 확인 및 입력</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery: 포트원 SDK가 의존하는 라이브러리 -->
    <script type="text/javascript" src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <!-- PortOne SDK -->
    <script type="text/javascript" src="https://cdn.iamport.kr/js/iamport.payment-1.2.0.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <header class="main-header"><div class="logo">쉬어가~ 계곡</div></header>
    <main class="booking-container">
        <h1 class="text-3xl font-bold text-center mb-6">최종 예약 정보 확인</h1>
        <div id="final-booking-summary" class="bg-white p-6 rounded-lg shadow mb-6">
            <p class="text-center text-gray-500">예약 정보를 불러오는 중...</p>
        </div>
        <form id="confirm-form" class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-semibold mb-4">예약자 정보를 입력해주세요.</h2>
            <div class="mb-4">
                <label for="user-name" class="block mb-2">이름</label>
                <input type="text" id="user-name" class="w-full p-2 border rounded" required>
            </div>
            <div class="mb-4">
                <label for="user-phone" class="block mb-2">전화번호</label>
                <input type="tel" id="user-phone" class="w-full p-2 border rounded" placeholder="010-1234-5678" required>
            </div>
            <button type="submit" class="btn btn-primary w-full">결제 하기</button>
        </form>
    </main>

    <!-- --- 수정된 부분: booking-final.js 내용을 여기에 통합하고 결제 로직 추가 --- -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const summaryDiv = document.getElementById('final-booking-summary');
            const confirmForm = document.getElementById('confirm-form');
            const submitButton = confirmForm.querySelector('button[type="submit"]');

            // 1. 예약 정보 불러오기
            const date = localStorage.getItem('selectedDate');
            const valley = localStorage.getItem('selectedValley');
            const section = localStorage.getItem('selectedSection');
            const deckString = localStorage.getItem('selectedDeck');

            if (!date || !valley || !section || !deckString) {
                alert('예약 정보가 올바르지 않습니다. 처음부터 다시 시도해주세요.');
                window.location.href = 'booking.html';
                return;
            }

            const deck = JSON.parse(deckString);

            // 2. 화면에 요약 정보 표시
            summaryDiv.innerHTML = `
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">예약하실 내역</h2>
                <div class="space-y-2">
                    <p><strong>날짜:</strong> ${date}</p>
                    <p><strong>계곡:</strong> ${valley}</p>
                    <p><strong>구역:</strong> ${section}</p>
                    <p><strong>평상:</strong> ${deck.name} (수용인원: ${deck.capacity}인)</p>
                    <p class="font-bold text-lg mt-2 pt-2 border-t"><strong>결제 금액:</strong> ${deck.price.toLocaleString()}원</p>
                </div>
            `;

            // 3. 포트원 초기화
            const IMP = window.IMP;
            IMP.init('imp02243407'); // 테스트용 가맹점 식별코드

            // 4. '결제 하기' 버튼 클릭 시 이벤트 처리
            confirmForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const userName = document.getElementById('user-name').value;
                const userPhone = document.getElementById('user-phone').value;

                // 포트원 결제 요청
                IMP.request_pay({
                    pg: "kakaopay",
                    pay_method: "card",
                    merchant_uid: "order_" + new Date().getTime(),
                    name: `${valley} ${section} ${deck.name}`,
                    amount: deck.price,
                    buyer_name: userName,
                    buyer_tel: userPhone,
                }, function (rsp) {
                    if (rsp.success) {
                        // 결제 성공 시, 백엔드 서버로 데이터 전송
                        submitButton.disabled = true;
                        submitButton.textContent = "예약 처리 중...";

                        const newBooking = {
                            name: userName,
                            phone: userPhone,
                            bookingDate: date,
                            valley,
                            section,
                            deckName: deck.name,
                            capacity: deck.capacity,
                            price: deck.price,
                            paymentId: rsp.imp_uid, // 결제 고유번호 추가
                            status: "예약 완료"
                        };

                        const serverUrl = 'https://o70albxd7n.onrender.com';
                        const fetchUrl = `${serverUrl}/api/bookings`;

                        fetch(fetchUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newBooking),
                        })
                        .then(response => {
                            if (!response.ok) {
                                return response.json().then(err => { throw new Error(err.message || '서버 응답 오류') });
                            }
                            return response.json();
                        })
                        .then(data => {
                            localStorage.removeItem('selectedDate');
                            localStorage.removeItem('selectedValley');
                            localStorage.removeItem('selectedSection');
                            localStorage.removeItem('selectedDeck');

                            alert('예약이 성공적으로 완료되었습니다.');
                            window.location.href = 'index.html';
                        })
                        .catch(error => {
                            console.error('예약 처리 중 오류 발생:', error);
                            alert(`결제는 성공했으나 예약 저장에 실패했습니다: ${error.message}`);
                            submitButton.disabled = false;
                            submitButton.textContent = "결제 하기";
                        });
                    } else {
                        alert("결제에 실패했습니다. 에러: " + rsp.error_msg);
                    }
                });
            });
        });
    </script>
</body>
</html>
