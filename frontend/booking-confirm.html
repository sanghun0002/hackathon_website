<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쉬어가 - 예약 및 결제</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- jQuery: 포트원 SDK가 의존하는 라이브러리 -->
    <script type="text/javascript" src="https://code.jquery.com/jquery-1.12.4.min.js" ></script>
    <!-- PortOne SDK -->
    <script type="text/javascript" src="https://cdn.iamport.kr/js/iamport.payment-1.2.0.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <div class="container mx-auto max-w-lg my-8 px-4">
        <header class="text-center mb-10">
            <a href="index.html" class="text-3xl font-bold text-gray-800">쉬어가~ 계곡</a>
        </header>

        <main id="booking-form-container" class="bg-white p-8 rounded-lg shadow-md">
            <h1 class="text-2xl font-bold text-center mb-2 text-gray-800">예약 정보 확인</h1>
            <p class="text-center text-gray-500 mb-6">예약자 정보를 입력하고 결제를 진행해주세요.</p>
            
            <!-- 예약 정보 요약 -->
            <div id="final-booking-summary" class="bg-gray-50 p-4 rounded-lg space-y-2 text-gray-700 mb-6">
                <!-- 요약 정보가 여기에 동적으로 채워집니다. -->
                <p>예약 정보를 불러오는 중...</p>
            </div>

            <form id="booking-complete-form" class="space-y-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">예약자 이름</label>
                    <input type="text" id="name" name="name" required placeholder="이름을 입력하세요"
                           class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700">전화번호</label>
                    <input type="tel" id="phone" name="phone" required placeholder="'-' 없이 입력"
                           class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <button type="submit" id="submit-btn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        결제하기
                    </button>
                </div>
            </form>
        </main>
        
        <div id="success-message" class="bg-white p-8 rounded-lg shadow-md text-center hidden">
             <h2 class="text-2xl font-bold text-blue-600 mb-4">예약 및 결제가 완료되었습니다!</h2>
             <p class="text-gray-600 mb-6">예약 조회 페이지에서 정보를 확인하실 수 있습니다.</p>
             <div class="flex gap-4 justify-center">
                <a href="bookingcheck.html" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-blue-700 transition">예약 조회하기</a>
                <a href="index.html" class="bg-gray-200 text-gray-800 font-bold py-3 px-8 rounded-lg hover:bg-gray-300 transition">홈으로</a>
             </div>
        </div>

    </div>

    <script>
        // --- 수정된 부분: Firebase 관련 코드 모두 제거 ---
        const summaryDiv = document.getElementById('final-booking-summary');
        const completeForm = document.getElementById('booking-complete-form');
        const submitBtn = document.getElementById('submit-btn');

        const date = localStorage.getItem('selectedDate');
        const valley = localStorage.getItem('selectedValley');
        const section = localStorage.getItem('selectedSection');
        const deckString = localStorage.getItem('selectedDeck');

        if (!date || !valley || !section || !deckString) {
            alert('예약 정보가 올바르지 않습니다. 처음부터 다시 시도해주세요.');
            window.location.href = 'booking.html';
        }

        const deck = JSON.parse(deckString);

        summaryDiv.innerHTML = `
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">예약하실 내역</h2>
            <div class="space-y-2">
                <p><strong>날짜:</strong> ${date}</p>
                <p><strong>계곡:</strong> ${valley}</p>
                <p><strong>구역:</strong> ${section}</p>
                <p><strong>평상:</strong> ${deck.name} (수용인원: ${deck.capacity}인)</p>
                <p class="font-bold text-lg"><strong>결제 금액:</strong> ${deck.price.toLocaleString()}원</p>
            </div>
        `;

        const IMP = window.IMP; 
        IMP.init('imp00000000'); 

        completeForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const amount = deck.price;

            IMP.request_pay({
                pg: "kakaopay", 
                pay_method: "card",
                merchant_uid: "order_" + new Date().getTime(),
                name: `${valley} ${section} ${deck.name}`,
                amount: amount,
                buyer_name: name,
                buyer_tel: phone,
            }, function (rsp) {
                if (rsp.success) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = '예약 정보 저장 중...';

                    // --- 수정된 부분: 다른 개발자의 백엔드로 데이터 전송 ---
                    const newBooking = {
                        name: name,
                        phone: phone,
                        bookingDate: date,
                        valley: valley,
                        section: section,
                        deckName: deck.name,
                        capacity: deck.capacity,
                        price: deck.price,
                        paymentId: rsp.imp_uid,
                        status: "예약 완료"
                    };

                    const serverUrl = 'https://o70albxd7n.onrender.com';
                    const fetchUrl = `${serverUrl}/api/bookings`;

                    fetch(fetchUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newBooking),
                    })
                    .then(response => {
                        if (!response.ok) {
                            return response.json().then(err => { throw new Error(err.message || '서버 응답 오류') });
                        }
                        return response.json();
                    })
                    .then(data => {
                        localStorage.removeItem('selectedDate');
                        localStorage.removeItem('selectedValley');
                        localStorage.removeItem('selectedSection');
                        localStorage.removeItem('selectedDeck');

                        document.getElementById('booking-form-container').classList.add('hidden');
                        document.getElementById('success-message').classList.remove('hidden');
                    })
                    .catch(error => {
                        console.error('예약 처리 중 오류 발생:', error);
                        alert(`결제는 성공했으나 예약 저장에 실패했습니다: ${error.message}`);
                        submitBtn.disabled = false;
                        submitBtn.textContent = "결제하기";
                    });
                    // --- 여기까지 수정 ---

                } else {
                    alert("결제에 실패했습니다. 에러: " + rsp.error_msg);
                }
            });
        });
    </script>
</body>
</html>
