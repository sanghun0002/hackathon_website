<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>평상 선택</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <header class="main-header">
        <div class="logo">쉬어가~ 계곡</div>
    </header>

    <main class="booking-container">
        <div class="step-indicator">
            <div class="step"><span>날짜 선택</span></div>
            <div class="step"><span>지역/계곡 선택</span></div>
            <div class="step"><span>구역 선택</span></div>
            <div class="step active"><span>평상 선택</span></div>
        </div>

        <div class="container mx-auto max-w-[1300px] bg-white p-6 rounded-lg shadow-lg">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold">평상 선택하기</h1>
                <p class="text-gray-600">
                    <span id="booking-info-display" class="font-bold text-blue-600"></span>
                    에서 사용할 평상을 선택해주세요.
                </p>
            </div>
            <div class="deck-image-container relative mb-6">
                <img id="deck-section-image" src="" alt="구역 이미지" class="w-full h-auto rounded-lg shadow-md" />
            </div>
        </div>
    </main>

    <div class="buttons">
        <a href="booking-step3.html" class="btn btn-secondary">← 이전</a>
        <button id="payment-btn" class="btn btn-primary" disabled>결제하기 →</button>
    </div>

    <footer class="main-footer"></footer>
    <script src="booking-step4.js"></script>
</body>
</html>
